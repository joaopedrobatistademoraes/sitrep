name: SITREP — Atualizar Dados

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_sitrep.py

      - name: Commit & push data.json
        run: |
          git config user.name  "sitrep-bot"
          git config user.email "sitrep-bot@users.noreply.github.com"
          git add public/data.json
          git diff --cached --quiet || git commit -m "chore: sitrep update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
